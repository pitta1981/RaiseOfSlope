<?xml version="1.0" encoding="UTF-8" standalone="no"?>
<svg xmlns="http://www.w3.org/2000/svg" width="128" height="128" viewBox="0 0 128 128">
  <defs>
    <linearGradient id="sky" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#87CEEB"/>
      <stop offset="100%" stop-color="#E0F7FA"/>
    </linearGradient>
  </defs>
  <rect width="128" height="128" fill="url(#sky)"/>

  <!-- Slope -->
  <polygon points="10,110 90,50 118,50 118,118 10,118" fill="#8E8B7B" stroke="#5A5A4E" stroke-width="2"/>

  <!-- Sliding mass -->
  <path d="M 70 62 C 70 52, 58 50, 52 60 C 46 70, 60 78, 68 72 C 76 66, 74 60, 70 62 Z" fill="#B71C1C" stroke="#880E0E" stroke-width="2"/>
  <path d="M 72 66 C 72 56, 60 54, 54 64 C 48 74, 62 82, 70 76 C 78 70, 76 64, 72 66 Z" fill="#FFCDD2" opacity="0.8"/>

  <!-- Rock debris -->
  <circle cx="95" cy="80" r="4" fill="#4E342E"/>
  <circle cx="105" cy="92" r="3" fill="#4E342E"/>
  <circle cx="88" cy="95" r="3" fill="#4E342E"/>

  <!-- Arrow showing movement -->
  <path d="M 74 68 L 90 84" stroke="#000" stroke-width="3" marker-end="url(#arrow)"/>
  <defs>
    <marker id="arrow" markerWidth="6" markerHeight="6" refX="5" refY="3" orient="auto">
      <path d="M0,0 L6,3 L0,6 Z" fill="#000"/>
    </marker>
  </defs>
</svg>
