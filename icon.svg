<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="128" height="128" viewBox="0 0 128 128">
  <defs>
    <linearGradient id="stableEarth" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#C4722A"/>
      <stop offset="100%" stop-color="#7A4419"/>
    </linearGradient>
    <linearGradient id="slidingMass" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#E8A455"/>
      <stop offset="100%" stop-color="#CB7D2F"/>
    </linearGradient>
    <linearGradient id="skyGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#C8E6F5"/>
      <stop offset="100%" stop-color="#EAF4FB"/>
    </linearGradient>
    <clipPath id="roundRect">
      <rect width="128" height="128" rx="18" ry="18"/>
    </clipPath>
  </defs>

  <!-- Rounded background (sky) -->
  <rect width="128" height="128" fill="url(#skyGrad)" rx="18" ry="18"/>

  <!-- Stable earth mass: below the failure arc, from left edge to bottom-right -->
  <!-- Path goes: bottom-left → toe of slope → follow failure arc to crest → down-right → bottom → close -->
  <path d="M 6,122 L 6,66 C 26,90 86,86 122,20 L 122,122 Z"
        fill="url(#stableEarth)" clip-path="url(#roundRect)"/>

  <!-- Sliding mass: lighter wedge between slope surface line and failure arc -->
  <!-- Goes from toe along slope line to crest, then back along arc to toe -->
  <path d="M 6,66 L 122,20 C 86,86 26,90 6,66 Z"
        fill="url(#slidingMass)" clip-path="url(#roundRect)"/>

  <!-- Slope surface border (ground profile) -->
  <line x1="6" y1="66" x2="122" y2="20" stroke="#3E2008" stroke-width="2"
        clip-path="url(#roundRect)"/>

  <!-- Failure surface arc — the key visual (red circular slip surface) -->
  <path d="M 6,66 C 26,90 86,86 122,20"
        fill="none" stroke="#D32F2F" stroke-width="5.5"
        stroke-linecap="round" clip-path="url(#roundRect)"/>
</svg>
